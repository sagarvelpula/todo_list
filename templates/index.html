<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        h1 { text-align: center; color: #333; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: #fff; margin: 5px 0; display: flex; justify-content: space-between; }
        button { background-color: #ff4b4b; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        
        <!-- Form to add a new task -->
        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="Enter a new task" required>
            <button type="submit">Add</button>
        </form>

        <!-- Display list of tasks -->
        <ul>
            {% for task in tasks %}
                <li>
                    {{ task }}
                    <a href="/delete/{{ loop.index0 }}"><button>Delete</button></a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
